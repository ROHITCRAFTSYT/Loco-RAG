server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable -> cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (never cache the HTML shell).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + health + SSE to the backend container.
    location ~ ^/(api|health) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        # SSE: disable buffering so tokens stream through immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        # Allow large file uploads for document ingestion.
        client_max_body_size 64m;
    }
}
