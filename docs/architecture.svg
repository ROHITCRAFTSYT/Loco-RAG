<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="460" fill="#0b0f19"/>

  <!-- Frontend -->
  <rect x="40" y="180" width="200" height="100" rx="10" fill="#111827" stroke="#61DAFB" stroke-width="2"/>
  <text x="140" y="220" fill="#e5e7eb" font-size="16" font-weight="600" text-anchor="middle">React (Vite)</text>
  <text x="140" y="242" fill="#9ca3af" font-size="12" text-anchor="middle">chat UI · SSE client</text>

  <!-- Backend -->
  <rect x="380" y="180" width="220" height="100" rx="10" fill="#111827" stroke="#009688" stroke-width="2"/>
  <text x="490" y="215" fill="#e5e7eb" font-size="16" font-weight="600" text-anchor="middle">FastAPI backend</text>
  <text x="490" y="235" fill="#9ca3af" font-size="12" text-anchor="middle">chat · RAG · agent · memory</text>
  <text x="490" y="253" fill="#9ca3af" font-size="12" text-anchor="middle">web search · voice</text>

  <!-- SSE arrow -->
  <line x1="240" y1="222" x2="380" y2="222" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="212" fill="#9ca3af" font-size="11" text-anchor="middle">SSE</text>

  <!-- LLM runtime -->
  <rect x="740" y="40" width="200" height="90" rx="10" fill="#111827" stroke="#f59e0b" stroke-width="2"/>
  <text x="840" y="75" fill="#e5e7eb" font-size="15" font-weight="600" text-anchor="middle">Ollama / LM Studio</text>
  <text x="840" y="95" fill="#9ca3af" font-size="11" text-anchor="middle">OpenAI-compatible /v1 API</text>
  <text x="840" y="112" fill="#9ca3af" font-size="11" text-anchor="middle">chat + embeddings</text>

  <!-- SQLite -->
  <rect x="740" y="150" width="200" height="80" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <text x="840" y="185" fill="#e5e7eb" font-size="15" font-weight="600" text-anchor="middle">SQLite</text>
  <text x="840" y="205" fill="#9ca3af" font-size="11" text-anchor="middle">conversations · messages · docs</text>

  <!-- Vector store -->
  <rect x="740" y="250" width="200" height="80" rx="10" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="840" y="285" fill="#e5e7eb" font-size="15" font-weight="600" text-anchor="middle">Chroma / LanceDB</text>
  <text x="840" y="305" fill="#9ca3af" font-size="11" text-anchor="middle">vector store</text>

  <!-- Web search -->
  <rect x="740" y="350" width="200" height="80" rx="10" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="840" y="380" fill="#e5e7eb" font-size="15" font-weight="600" text-anchor="middle">DuckDuckGo / SearXNG</text>
  <text x="840" y="400" fill="#9ca3af" font-size="11" text-anchor="middle">web search</text>

  <!-- backend to services arrows -->
  <line x1="600" y1="210" x2="740" y2="85" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="222" x2="740" y2="190" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="245" x2="740" y2="290" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="260" x2="740" y2="385" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="20" y="30" fill="#e5e7eb" font-size="18" font-weight="700">Loco-RAG — architecture</text>
  <text x="20" y="430" fill="#6b7280" font-size="11">Everything runs locally: no calls leave the box except optional web search.</text>
</svg>
