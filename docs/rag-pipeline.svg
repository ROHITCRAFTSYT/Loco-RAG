<svg viewBox="0 0 980 370" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="980" height="370" fill="#0b0f19"/>

  <text x="490" y="30" fill="#e5e7eb" font-size="16" font-weight="700" text-anchor="middle">RAG Pipeline</text>

  <!-- ── INGEST ROW ── -->
  <text x="12" y="72" fill="#f59e0b" font-size="9" font-weight="700" text-anchor="middle" transform="rotate(-90,12,88)">INGEST</text>

  <rect x="28"  y="50" width="130" height="60" rx="7" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="93"  y="77" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Documents</text>
  <text x="93"  y="94" fill="#9ca3af" font-size="10" text-anchor="middle">PDF · DOCX · TXT · MD</text>

  <line x1="158" y1="80" x2="178" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="180" y="50" width="120" height="60" rx="7" fill="#1f2937" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="240" y="77" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Parse</text>
  <text x="240" y="94" fill="#9ca3af" font-size="10" text-anchor="middle">text + metadata</text>

  <line x1="300" y1="80" x2="320" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="322" y="50" width="130" height="60" rx="7" fill="#1f2937" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="387" y="74" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Chunk</text>
  <text x="387" y="90" fill="#9ca3af" font-size="10" text-anchor="middle">512 tok / 64 overlap</text>
  <text x="387" y="104" fill="#9ca3af" font-size="10" text-anchor="middle">tiktoken sliding window</text>

  <line x1="452" y1="80" x2="472" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="474" y="50" width="120" height="60" rx="7" fill="#1f2937" stroke="#34d399" stroke-width="1.5"/>
  <text x="534" y="74" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Embed</text>
  <text x="534" y="90" fill="#9ca3af" font-size="10" text-anchor="middle">fastembed / Ollama</text>
  <text x="534" y="104" fill="#9ca3af" font-size="10" text-anchor="middle">local, no API key</text>

  <line x1="594" y1="80" x2="614" y2="80" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="616" y="42" width="162" height="76" rx="7" fill="#1f2937" stroke="#f87171" stroke-width="2"/>
  <text x="697" y="71" fill="#e5e7eb" font-size="13" font-weight="700" text-anchor="middle">Vector Store</text>
  <text x="697" y="89" fill="#9ca3af" font-size="10" text-anchor="middle">ChromaDB · LanceDB</text>
  <text x="697" y="106" fill="#9ca3af" font-size="10" text-anchor="middle">vectors + BM25 index</text>

  <!-- ── DIVIDER ── -->
  <line x1="28" y1="148" x2="920" y2="148" stroke="#374151" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="490" y="165" fill="#4b5563" font-size="10" text-anchor="middle">retrieval at query time ↓</text>

  <!-- ── RETRIEVE ROW ── -->
  <text x="12" y="270" fill="#61DAFB" font-size="9" font-weight="700" text-anchor="middle" transform="rotate(-90,12,280)">RETRIEVE</text>

  <rect x="28" y="215" width="130" height="60" rx="7" fill="#1f2937" stroke="#61DAFB" stroke-width="1.5"/>
  <text x="93" y="242" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">User Query</text>
  <text x="93" y="259" fill="#9ca3af" font-size="10" text-anchor="middle">natural language</text>

  <!-- fork from Query -->
  <line x1="158" y1="245" x2="173" y2="245" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="173" y1="245" x2="173" y2="232" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="173" y1="232" x2="181" y2="232" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="173" y1="245" x2="173" y2="290" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="173" y1="290" x2="181" y2="290" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="183" y="207" width="130" height="52" rx="7" fill="#1f2937" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="248" y="231" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Dense Search</text>
  <text x="248" y="248" fill="#9ca3af" font-size="10" text-anchor="middle">cosine similarity</text>

  <rect x="183" y="267" width="130" height="52" rx="7" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="248" y="291" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">BM25</text>
  <text x="248" y="308" fill="#9ca3af" font-size="10" text-anchor="middle">keyword ranking</text>

  <!-- store → dense (red supply line) -->
  <line x1="697" y1="118" x2="697" y2="148" stroke="#f87171" stroke-width="1.5"/>
  <line x1="697" y1="148" x2="248" y2="148" stroke="#f87171" stroke-width="1.5"/>
  <line x1="248" y1="148" x2="248" y2="205" stroke="#f87171" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Dense+BM25 → RRF -->
  <line x1="313" y1="232" x2="337" y2="258" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="313" y1="293" x2="337" y2="270" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="339" y="243" width="115" height="52" rx="7" fill="#1f2937" stroke="#34d399" stroke-width="1.5"/>
  <text x="397" y="267" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">RRF Fusion</text>
  <text x="397" y="284" fill="#9ca3af" font-size="10" text-anchor="middle">rank merging</text>

  <line x1="454" y1="269" x2="474" y2="269" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="476" y="243" width="120" height="52" rx="7" fill="#1f2937" stroke="#f87171" stroke-width="1.5"/>
  <text x="536" y="264" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Rerank</text>
  <text x="536" y="280" fill="#9ca3af" font-size="10" text-anchor="middle">cross-encoder</text>
  <text x="536" y="292" fill="#4b5563" font-size="9" text-anchor="middle">(optional)</text>

  <line x1="596" y1="269" x2="616" y2="269" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="618" y="243" width="120" height="52" rx="7" fill="#1f2937" stroke="#009688" stroke-width="1.5"/>
  <text x="678" y="264" fill="#e5e7eb" font-size="12" font-weight="600" text-anchor="middle">Build Context</text>
  <text x="678" y="280" fill="#9ca3af" font-size="10" text-anchor="middle">top-k + [n] citations</text>

  <line x1="738" y1="269" x2="758" y2="269" stroke="#6b7280" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="760" y="234" width="140" height="70" rx="7" fill="#1f2937" stroke="#61DAFB" stroke-width="2"/>
  <text x="830" y="259" fill="#e5e7eb" font-size="13" font-weight="700" text-anchor="middle">LLM Answer</text>
  <text x="830" y="275" fill="#9ca3af" font-size="10" text-anchor="middle">Ollama / LM Studio</text>
  <text x="830" y="292" fill="#34d399" font-size="10" text-anchor="middle">+ inline citations ✓</text>

  <text x="490" y="358" fill="#4b5563" font-size="10" text-anchor="middle">All embedding and inference runs locally — no data leaves the machine.</text>
</svg>
